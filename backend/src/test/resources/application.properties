# JWT config
# Base64-encoded secret long enough for HS256/HS512; adjust depending on your JwtUtil expectations.
# This is a 32-byte base64 (suitable for HS256).
jwt.secret=TopSecretKeyForJWTGenerationWhichIsLongEnough
# 3600000 = 1 hour
jwt.expirationMs=3600000

spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:regdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
