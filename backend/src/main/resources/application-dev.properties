# Development profile
# H2 file-based database.
# The file is created under target/ so that "mvn clean" resets the database.
# ddl-auto=update preserves rows between restarts — re-entered data survives.
spring.datasource.url=jdbc:h2:file:./target/devdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# H2 web console — browse the database at /api/h2-console while the app is running
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT — fixed dev secret, not suitable for production
jwt.secret=DevSecretKeyForJWTTokenGenerationWhichIsLongEnough
jwt.expirationMs=3600000
